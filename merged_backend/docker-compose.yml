services:
  db:
    container_name: db
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./deploy/data:/seed-data:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      app_network:
        aliases:
          - db.lvh.me

  migrator:
    container_name: migrator
    image: migrate/migrate:v4.18.3
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]
    restart: "no"
    networks:
      app_network:
        aliases:
          - migrator.lvh.me

  db-seed:
    container_name: db-seed
    image: postgis/postgis:18-3.6-alpine
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./deploy/data:/seed-data:ro
      - ./deploy/db-init:/db-init:ro
    entrypoint: ["psql"]
    command: ["-v", "ON_ERROR_STOP=1", "-f", "/db-init/10-seed-samara.sql"]
    restart: "no"
    networks:
      app_network:
        aliases:
          - db-seed.lvh.me

  minio:
    container_name: minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      app_network:
        aliases:
          - minio.lvh.me

  mc-init:
    container_name: mc-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY} &&
      mc mb -p local/${AWS_S3_BUCKET} || true &&
      mc anonymous set download local/${AWS_S3_BUCKET} || true
      "
    restart: "no"
    networks:
      app_network:
        aliases:
          - mc.lvh.me

  app:
    container_name: app
    platform: linux/amd64
    pid: "host"
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      db-seed:
        condition: service_completed_successfully
      mc-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: "2Gb"
        reservations:
          cpus: "0.60"
          memory: "1Gb"
    networks:
      app_network:
        aliases:
          - app.lvh.me

networks:
  app_network:
    external: false

volumes:
  db_data:
  minio_data:
