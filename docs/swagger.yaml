basePath: /v1
definitions:
  entity.User:
    properties:
      apartment:
        type: string
      avatar_url:
        description: AvatarURL stores identifier or URL of avatar image (e.g. S3 key).
        type: string
      city:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        type: string
      house:
        type: string
      id:
        type: integer
      is_blocked:
        type: boolean
      last_name:
        type: string
      login:
        type: string
      middle_name:
        type: string
      phone:
        type: string
      role:
        description: user, admin, premium
        type: string
      street:
        type: string
      updated_at:
        type: string
    type: object
  request.CreateCategory:
    properties:
      title:
        type: string
    required:
    - title
    type: object
  request.CreateIncident:
    properties:
      address_text:
        example: Самара, проспект Ленина, 1
        type: string
      category_id:
        example: 1
        type: integer
      city:
        example: Самара
        type: string
      department_name:
        example: ГИБДД
        type: string
      description:
        example: Автомобиль припаркован на газоне и мешает проходу.
        maxLength: 600
        type: string
      house:
        example: "1"
        type: string
      latitude:
        example: 53.2051714
        type: number
      longitude:
        example: 50.1334676
        type: number
      status:
        enum:
        - draft
        - review
        - published
        example: review
        type: string
      street:
        example: проспект Ленина
        type: string
      title:
        example: Неправильная парковка во дворе
        maxLength: 255
        type: string
    required:
    - category_id
    - description
    - title
    type: object
  request.CreateUser:
    properties:
      apartment:
        example: "10"
        type: string
      city:
        example: Москва
        type: string
      email:
        example: user@example.com
        type: string
      first_name:
        example: Иван
        type: string
      house:
        example: "1"
        type: string
      last_name:
        example: Иванов
        type: string
      login:
        example: user123
        type: string
      middle_name:
        example: Иванович
        type: string
      password:
        example: qwerty123
        minLength: 6
        type: string
      phone:
        example: "+79991234567"
        type: string
      street:
        example: Тверская
        type: string
    required:
    - city
    - email
    - first_name
    - house
    - last_name
    - login
    - password
    - phone
    - street
    type: object
  request.CreateUserByAdmin:
    properties:
      apartment:
        example: "10"
        type: string
      city:
        example: Москва
        type: string
      email:
        example: user@example.com
        type: string
      first_name:
        example: Иван
        type: string
      house:
        example: "1"
        type: string
      is_blocked:
        example: false
        type: boolean
      last_name:
        example: Иванов
        type: string
      login:
        example: user123
        type: string
      middle_name:
        example: Иванович
        type: string
      password:
        example: qwerty123
        minLength: 6
        type: string
      phone:
        example: "+79991234567"
        type: string
      role:
        enum:
        - user
        - admin
        - premium
        example: user
        type: string
      street:
        example: Тверская
        type: string
    required:
    - city
    - email
    - first_name
    - house
    - last_name
    - login
    - password
    - phone
    - street
    type: object
  request.Login:
    properties:
      identifier:
        example: user123
        type: string
      password:
        example: qwerty123
        type: string
    required:
    - identifier
    - password
    type: object
  request.RegisterPushDevice:
    properties:
      app_version:
        example: 1.0.0
        maxLength: 64
        type: string
      device_id:
        example: 0a2a97ae-9d0a-4ef1-9729-e7d8e31ab001
        maxLength: 255
        type: string
      fcm_token:
        example: fcm-registration-token
        maxLength: 4096
        type: string
      platform:
        enum:
        - android
        - ios
        - web
        - pwa
        example: web
        type: string
    required:
    - device_id
    - fcm_token
    - platform
    type: object
  request.ResetPasswordWithCode:
    properties:
      code:
        example: "123456"
        type: string
      email:
        example: user@example.com
        type: string
      new_password:
        example: newsecret1
        minLength: 6
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  request.SendEmailVerificationCode:
    properties:
      email:
        example: user@example.com
        type: string
      purpose:
        enum:
        - register
        - change_email
        example: register
        type: string
    required:
    - email
    - purpose
    type: object
  request.SendFeedback:
    properties:
      email:
        example: user@example.com
        type: string
      message:
        example: Текст обращения
        maxLength: 8000
        minLength: 10
        type: string
      name:
        example: Иван
        maxLength: 200
        type: string
    required:
    - message
    type: object
  request.SendIncidentDocumentEmail:
    properties:
      email:
        example: user@example.com
        type: string
    type: object
  request.SendPasswordResetCode:
    properties:
      email:
        example: user@example.com
        type: string
    required:
    - email
    type: object
  request.UpdateCategory:
    properties:
      title:
        type: string
    type: object
  request.UpdateIncident:
    properties:
      address_text:
        example: Самара, проспект Ленина, 1
        type: string
      category_id:
        example: 1
        type: integer
      city:
        example: Самара
        type: string
      department_name:
        example: ГИБДД
        type: string
      description:
        example: Автомобиль припаркован на газоне и мешает проходу.
        maxLength: 600
        type: string
      house:
        example: "1"
        type: string
      latitude:
        example: 53.2051714
        type: number
      longitude:
        example: 50.1334676
        type: number
      status:
        enum:
        - draft
        - review
        - published
        example: review
        type: string
      street:
        example: проспект Ленина
        type: string
      title:
        example: Неправильная парковка во дворе
        maxLength: 255
        type: string
    type: object
  request.UpdateUser:
    properties:
      apartment:
        example: "10"
        type: string
      city:
        example: Москва
        type: string
      email:
        example: user@example.com
        type: string
      first_name:
        example: Иван
        type: string
      house:
        example: "1"
        type: string
      is_blocked:
        example: false
        type: boolean
      last_name:
        example: Иванов
        type: string
      login:
        example: user123
        type: string
      middle_name:
        example: Иванович
        type: string
      phone:
        example: "+79991234567"
        type: string
      role:
        enum:
        - user
        - admin
        - premium
        example: user
        type: string
      street:
        example: Тверская
        type: string
    required:
    - city
    - email
    - first_name
    - house
    - last_name
    - login
    - phone
    - role
    - street
    type: object
  request.VerifyEmailVerificationCode:
    properties:
      code:
        example: "123456"
        type: string
      email:
        example: user@example.com
        type: string
      purpose:
        enum:
        - register
        - change_email
        example: register
        type: string
    required:
    - code
    - email
    - purpose
    type: object
  response.AuthLogin:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      token_type:
        example: Bearer
        type: string
      user:
        $ref: '#/definitions/entity.User'
    type: object
  response.Error:
    properties:
      error:
        example: some informative error message
        type: string
    type: object
  response.GeoAddress:
    properties:
      city:
        example: Самара
        type: string
      full_address:
        example: 1, проспект Ленина, Октябрьский район, Самара, городской округ Самара,
          Самарская область, Приволжский федеральный округ, 443110, Россия
        type: string
      house_number:
        example: "1"
        type: string
      lat:
        example: 53.2051714
        type: number
      lon:
        example: 50.1334676
        type: number
      road:
        example: проспект Ленина
        type: string
    type: object
  response.Incident:
    properties:
      address_text:
        example: Самара, проспект Ленина, 1
        type: string
      category_id:
        example: 1
        type: integer
      category_title:
        example: Нарушение правил парковки
        type: string
      city:
        example: Самара
        type: string
      created_at:
        type: string
      department_name:
        example: ГИБДД
        type: string
      description:
        example: Автомобиль припаркован на газоне и мешает проходу.
        type: string
      house:
        example: "1"
        type: string
      id:
        example: 1
        type: integer
      latitude:
        example: 53.2051714
        type: number
      longitude:
        example: 50.1334676
        type: number
      photos:
        items:
          $ref: '#/definitions/response.IncidentPhoto'
        type: array
      published_at:
        type: string
      status:
        example: published
        type: string
      street:
        example: проспект Ленина
        type: string
      title:
        example: Неправильная парковка во дворе
        type: string
      updated_at:
        type: string
      user_id:
        example: 2
        type: integer
    type: object
  response.IncidentPhoto:
    properties:
      content_type:
        example: image/jpeg
        type: string
      created_at:
        type: string
      file_url:
        example: http://localhost:9000/avatars/incidents/1/photo-1.jpg
        type: string
      id:
        example: 10
        type: integer
      size_bytes:
        example: 245678
        type: integer
      sort_order:
        example: 0
        type: integer
    type: object
  response.MessageResponse:
    properties:
      message:
        example: ok
        type: string
    type: object
  response.ReverseGeocodeResponse:
    properties:
      data:
        $ref: '#/definitions/response.GeoAddress'
      status:
        example: success
        type: string
    type: object
  response.SearchAddressResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/response.GeoAddress'
        type: array
      status:
        example: success
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Service for conscientious citizens
  title: Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login by login/email/phone + password. Returns a JWT access token
        and the authenticated user profile.
      operationId: login
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: JWT access token and authenticated user
          schema:
            $ref: '#/definitions/response.AuthLogin'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Public registration endpoint. Creates a regular user registration
        that must be confirmed by email code.
      operationId: register
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateUser'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Register
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: Returns all active categories. Category icon URLs are returned
        in the icon_url field when an icon is uploaded.
      operationId: list-categories
      produces:
      - application/json
      responses:
        "200":
          description: status + categories list
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Creates a new category. Category icons are uploaded separately
        via multipart/form-data endpoint. Admin only.
      operationId: create-category
      parameters:
      - description: Category payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateCategory'
      produces:
      - application/json
      responses:
        "201":
          description: status + created category
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - categories
  /categories/{id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes a category by ID. Admin only.
      operationId: delete-category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - BearerAuth: []
      summary: Delete a category
      tags:
      - categories
    get:
      consumes:
      - application/json
      description: Returns a single active category by its ID, including icon_url
        when an icon is uploaded.
      operationId: get-category-by-id
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: status + category
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Get category by ID
      tags:
      - categories
    patch:
      consumes:
      - application/json
      description: Partially updates a category by ID. Category icons are managed
        via dedicated upload/delete endpoints. Admin only.
      operationId: update-category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateCategory'
      produces:
      - application/json
      responses:
        "200":
          description: status + updated category
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID or request body
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - BearerAuth: []
      summary: Update a category
      tags:
      - categories
  /categories/{id}/icon:
    delete:
      consumes:
      - application/json
      description: Deletes a category icon from MinIO/S3 and clears icon_url. Admin
        only.
      operationId: delete-category-icon
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - BearerAuth: []
      summary: Delete category icon
      tags:
      - categories
    post:
      consumes:
      - multipart/form-data
      description: Uploads a category icon to MinIO/S3 and stores its public URL in
        icon_url. Accepts PNG/JPG up to 2MB. Admin only.
      operationId: upload-category-icon
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category icon (PNG/JPG, max 2MB)
        in: formData
        name: icon
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: status + updated category
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - BearerAuth: []
      summary: Upload category icon
      tags:
      - categories
  /feedback:
    post:
      consumes:
      - application/json
      description: Письмо уходит на служебный адрес SMTP (тот же, что для кодов на
        почту)
      operationId: send-feedback
      parameters:
      - description: Текст и опционально контакты
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.SendFeedback'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/response.Error'
      summary: Отправить обращение
      tags:
      - feedback
  /incidents:
    get:
      consumes:
      - application/json
      description: Возвращает общий список инцидентов. Для обычного пользователя и
        анонимного запроса возвращаются только published. Для администратора по умолчанию
        возвращаются published и review, а query-параметр status можно передавать
        несколько раз, чтобы выбрать нужные статусы.
      operationId: list-incidents
      parameters:
      - description: Bearer access token. Для admin включает расширенный список и
          фильтры по статусам.
        in: header
        name: Authorization
        type: string
      - collectionFormat: multi
        description: Фильтр по статусам для admin; параметр можно повторять
        in: query
        items:
          type: string
        name: status
        type: array
      - description: ID категории
        in: query
        name: category_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.Incident'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Получить список инцидентов
      tags:
      - incidents
    post:
      consumes:
      - application/json
      description: Создает новое сообщение об инциденте для авторизованного пользователя.
        Если статус не указан, инцидент сохраняется в review. Если обычный пользователь
        передает published, статус понижается до review. Администратор может сохранить
        published сразу.
      operationId: create-incident
      parameters:
      - description: Данные инцидента
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateIncident'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Incident'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      security:
      - BearerAuth: []
      summary: Создать инцидент
      tags:
      - incidents
  /incidents/{id}:
    delete:
      consumes:
      - application/json
      description: Удаляет инцидент и связанные с ним фотографии. Доступно только
        автору или администратору.
      operationId: delete-incident
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
