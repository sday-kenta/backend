basePath: /v1
definitions:
  entity.Category:
    properties:
      icon_url:
        type: string
      id:
        type: integer
      title:
        type: string
    type: object
  entity.User:
    properties:
      apartment:
        type: string
      avatar_url:
        description: AvatarURL stores identifier or URL of avatar image (e.g. S3 key).
        type: string
      city:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      house:
        type: string
      id:
        type: integer
      is_blocked:
        type: boolean
      last_name:
        type: string
      login:
        type: string
      middle_name:
        type: string
      phone:
        type: string
      role:
        description: user, admin, premium
        type: string
      street:
        type: string
      updated_at:
        type: string
    type: object
  request.CreateCategory:
    properties:
      icon_url:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  request.CreateIncident:
    properties:
      address_text:
        example: Самара, проспект Ленина, 1
        type: string
      category_id:
        example: 1
        type: integer
      city:
        example: Самара
        type: string
      department_name:
        example: ГИБДД
        type: string
      description:
        example: Автомобиль припаркован на газоне и мешает проходу.
        maxLength: 600
        type: string
      house:
        example: "1"
        type: string
      latitude:
        example: 53.2051714
        type: number
      longitude:
        example: 50.1334676
        type: number
      status:
        enum:
        - draft
        - published
        example: published
        type: string
      street:
        example: проспект Ленина
        type: string
      title:
        example: Неправильная парковка во дворе
        maxLength: 255
        type: string
    required:
    - category_id
    - description
    - title
    type: object
  request.CreateUser:
    properties:
      apartment:
        example: "10"
        type: string
      city:
        example: Москва
        type: string
      email:
        example: user@example.com
        type: string
      first_name:
        example: Иван
        type: string
      house:
        example: "1"
        type: string
      is_blocked:
        example: false
        type: boolean
      last_name:
        example: Иванов
        type: string
      login:
        example: user123
        type: string
      middle_name:
        example: Иванович
        type: string
      password:
        example: qwerty123
        type: string
      phone:
        example: "+79991234567"
        type: string
      role:
        enum:
        - user
        - admin
        - premium
        example: user
        type: string
      street:
        example: Тверская
        type: string
    required:
    - city
    - email
    - first_name
    - house
    - last_name
    - login
    - password
    - phone
    - role
    - street
    type: object
  request.Login:
    properties:
      identifier:
        example: user123
        type: string
      password:
        example: qwerty123
        type: string
    required:
    - identifier
    - password
    type: object
  request.SendEmailVerificationCode:
    properties:
      email:
        example: user@example.com
        type: string
      purpose:
        enum:
        - register
        - change_email
        example: register
        type: string
    required:
    - email
    - purpose
    type: object
  request.SendIncidentDocumentEmail:
    properties:
      email:
        example: user@example.com
        type: string
    type: object
  request.SendPasswordResetCode:
    properties:
      email:
        example: user@example.com
        type: string
    required:
    - email
    type: object
  request.UpdateCategory:
    properties:
      icon_url:
        type: string
      title:
        type: string
    type: object
  request.UpdateIncident:
    properties:
      address_text:
        example: Самара, проспект Ленина, 1
        type: string
      category_id:
        example: 1
        type: integer
      city:
        example: Самара
        type: string
      department_name:
        example: ГИБДД
        type: string
      description:
        example: Автомобиль припаркован на газоне и мешает проходу.
        maxLength: 600
        type: string
      house:
        example: "1"
        type: string
      latitude:
        example: 53.2051714
        type: number
      longitude:
        example: 50.1334676
        type: number
      status:
        enum:
        - draft
        - published
        example: draft
        type: string
      street:
        example: проспект Ленина
        type: string
      title:
        example: Неправильная парковка во дворе
        maxLength: 255
        type: string
    type: object
  request.UpdateUser:
    properties:
      apartment:
        example: "10"
        type: string
      city:
        example: Москва
        type: string
      email:
        example: user@example.com
        type: string
      first_name:
        example: Иван
        type: string
      house:
        example: "1"
        type: string
      is_blocked:
        example: false
        type: boolean
      last_name:
        example: Иванов
        type: string
      login:
        example: user123
        type: string
      middle_name:
        example: Иванович
        type: string
      phone:
        example: "+79991234567"
        type: string
      role:
        enum:
        - user
        - admin
        - premium
        example: user
        type: string
      street:
        example: Тверская
        type: string
    required:
    - city
    - email
    - first_name
    - house
    - last_name
    - login
    - phone
    - role
    - street
    type: object
  request.VerifyEmailVerificationCode:
    properties:
      code:
        example: "123456"
        type: string
      email:
        example: user@example.com
        type: string
      purpose:
        enum:
        - register
        - change_email
        example: register
        type: string
    required:
    - code
    - email
    - purpose
    type: object
  response.Error:
    properties:
      error:
        example: some informative error message
        type: string
    type: object
  response.GeoAddress:
    properties:
      city:
        example: Самара
        type: string
      full_address:
        example: 1, проспект Ленина, Октябрьский район, Самара, городской округ Самара,
          Самарская область, Приволжский федеральный округ, 443110, Россия
        type: string
      house_number:
        example: "1"
        type: string
      lat:
        example: 53.2051714
        type: number
      lon:
        example: 50.1334676
        type: number
      road:
        example: проспект Ленина
        type: string
    type: object
  response.Incident:
    properties:
      address_text:
        example: Самара, проспект Ленина, 1
        type: string
      category_id:
        example: 1
        type: integer
      category_title:
        example: Нарушение правил парковки
        type: string
      city:
        example: Самара
        type: string
      created_at:
        type: string
      department_name:
        example: ГИБДД
        type: string
      description:
        example: Автомобиль припаркован на газоне и мешает проходу.
        type: string
      house:
        example: "1"
        type: string
      id:
        example: 1
        type: integer
      latitude:
        example: 53.2051714
        type: number
      longitude:
        example: 50.1334676
        type: number
      photos:
        items:
          $ref: '#/definitions/response.IncidentPhoto'
        type: array
      published_at:
        type: string
      status:
        example: published
        type: string
      street:
        example: проспект Ленина
        type: string
      title:
        example: Неправильная парковка во дворе
        type: string
      updated_at:
        type: string
      user_id:
        example: 2
        type: integer
    type: object
  response.IncidentPhoto:
    properties:
      content_type:
        example: image/jpeg
        type: string
      created_at:
        type: string
      file_url:
        example: http://localhost:9000/avatars/incidents/1/photo-1.jpg
        type: string
      id:
        example: 10
        type: integer
      size_bytes:
        example: 245678
        type: integer
      sort_order:
        example: 0
        type: integer
    type: object
  response.MessageResponse:
    properties:
      message:
        example: ok
        type: string
    type: object
  response.ReverseGeocodeResponse:
    properties:
      data:
        $ref: '#/definitions/response.GeoAddress'
      status:
        example: success
        type: string
    type: object
  response.SearchAddressResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/response.GeoAddress'
        type: array
      status:
        example: success
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Combined users and maps service API
  title: Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login by login/email/phone + password
      operationId: login
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.Login'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Login
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: Returns a list of all active categories (rubrics)
      operationId: get-categories
      produces:
      - application/json
      responses:
        "200":
          description: List of categories
          schema:
            items:
              $ref: '#/definitions/entity.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Get all categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Creates a new category (Admin only)
      operationId: create-category
      parameters:
      - default: admin
        description: User role (must be 'admin')
        in: header
        name: X-User-Role
        required: true
        type: string
      - description: Data for new category
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateCategory'
      produces:
      - application/json
      responses:
        "201":
          description: Created category
          schema:
            $ref: '#/definitions/entity.Category'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Create a new category
      tags:
      - categories
  /categories/{id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes a category by ID (Admin only)
      operationId: delete-category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - default: admin
        description: User role (must be 'admin')
        in: header
        name: X-User-Role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Delete a category
      tags:
      - categories
    get:
      consumes:
      - application/json
      description: Returns a single active category by its ID
      operationId: get-category-by-id
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Single category
          schema:
            $ref: '#/definitions/entity.Category'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Get category by ID
      tags:
      - categories
    patch:
      consumes:
      - application/json
      description: Partially updates a category by ID (Admin only)
      operationId: update-category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - default: admin
        description: User role (must be 'admin')
        in: header
        name: X-User-Role
        required: true
        type: string
      - description: Data to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateCategory'
      produces:
      - application/json
      responses:
        "200":
          description: Updated category
          schema:
            $ref: '#/definitions/entity.Category'
        "400":
          description: Invalid ID or request body
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Update a category
      tags:
      - categories
  /incidents:
    get:
      consumes:
      - application/json
      description: Возвращает общий список опубликованных сообщений. Черновики в эту
        выборку не попадают.
      operationId: list-incidents
      parameters:
      - description: ID категории
        in: query
        name: category_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.Incident'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Получить список всех опубликованных инцидентов
      tags:
      - incidents
    post:
      consumes:
      - application/json
      description: Создает новое сообщение об инциденте. До внедрения JWT автор определяется
        по заголовку X-User-ID.
      operationId: create-incident
      parameters:
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Данные инцидента
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateIncident'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Incident'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Создать инцидент
      tags:
      - incidents
  /incidents/{id}:
    delete:
      consumes:
      - application/json
      description: Удаляет инцидент и связанные с ним фотографии. Доступно только
        автору или администратору.
      operationId: delete-incident
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        required: true
        type: integer
      - default: user
        description: Роль текущего пользователя
        in: header
        name: X-User-Role
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Удалить инцидент
      tags:
      - incidents
    get:
      consumes:
      - application/json
      description: Возвращает детальную карточку инцидента. Черновик доступен только
        автору или администратору.
      operationId: get-incident
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        type: integer
      - default: user
        description: Роль текущего пользователя
        in: header
        name: X-User-Role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Incident'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Получить инцидент по ID
      tags:
      - incidents
    patch:
      consumes:
      - application/json
      description: Обновляет сообщение об инциденте. Доступно только автору или администратору.
      operationId: update-incident
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        required: true
        type: integer
      - default: user
        description: Роль текущего пользователя
        in: header
        name: X-User-Role
        type: string
      - description: Поля для обновления инцидента
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.UpdateIncident'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Incident'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Обновить инцидент
      tags:
      - incidents
  /incidents/{id}/document/download:
    get:
      consumes:
      - application/json
      description: Возвращает HTML-документ обращения по инциденту с Content-Disposition
        attachment.
      operationId: download-incident-document
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        required: true
        type: integer
      - default: user
        description: Роль текущего пользователя
        in: header
        name: X-User-Role
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML документ обращения
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Скачать документ обращения
      tags:
      - incidents
  /incidents/{id}/document/email:
    post:
      consumes:
      - application/json
      description: Отправляет документ обращения на указанный email. Если email не
        передан, используется email автора инцидента.
      operationId: email-incident-document
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        required: true
        type: integer
      - default: user
        description: Роль текущего пользователя
        in: header
        name: X-User-Role
        type: string
      - description: Email получателя; можно не передавать
        in: body
        name: request
        schema:
          $ref: '#/definitions/request.SendIncidentDocumentEmail'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Отправить документ обращения на email
      tags:
      - incidents
  /incidents/{id}/document/print:
    get:
      consumes:
      - application/json
      description: Возвращает HTML-документ обращения с inline Content-Disposition
        для печати на клиенте.
      operationId: print-incident-document
      parameters:
      - description: ID инцидента
        in: path
        name: id
        required: true
        type: integer
      - description: ID текущего пользователя
        in: header
        name: X-User-ID
        required: true
        type: integer
      - default: user
        description: Роль текущего пользователя
        in: header
        name: X-User-Role
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML документ обращения
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Получить печатную версию документа обращения
